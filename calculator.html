<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profit Master Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4 font-sans antialiased">
    <div id="lockScreen" class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-lg text-center mt-12">
        <div class="text-red-500 text-5xl mb-4">🔒</div>
        <h2 class="text-xl font-bold text-gray-800 mb-2">Invalid Access Link</h2>
        <p class="text-sm text-gray-500">Please use your unique company link.</p>
    </div>

    <div id="appContainer" class="hidden max-w-md mx-auto bg-white p-6 rounded-xl shadow-lg mt-6">
        <div class="flex items-center justify-between border-b pb-4 mb-6">
            <div>
                <h1 class="text-2xl font-black text-gray-900">PROFIT MASTER</h1>
                <p id="companyName" class="text-xs font-bold text-blue-600 uppercase"></p>
            </div>
            <div class="h-10 w-10 bg-gray-800 rounded-lg flex items-center justify-center text-white font-black text-xl">🛠️</div>
        </div>
        
        <div id="summary" class="p-6 rounded-xl text-white shadow-lg mb-6 transition-colors duration-300 bg-green-600">
            <p class="text-xs font-bold opacity-80 uppercase tracking-widest">Net Profit</p>
            <h2 id="netProfit" class="text-4xl font-black mb-2">$0.00</h2>
            <div class="flex justify-between text-sm font-bold pt-2 border-t border-white/20">
                <p>Gross: <span id="gMargin">0</span>%</p>
                <p>Net: <span id="nMargin">0</span>%</p>
            </div>
        </div>

        <div class="space-y-4">
            <select id="commType" class="w-full h-12 p-3 border rounded-lg bg-white">
                <option value="percent">Percentage (%)</option>
                <option value="flat">Flat Fee ($)</option>
            </select>
            <div id="inputFieldsContainer" class="grid grid-cols-2 gap-4"></div>
            <button onclick="resetCalculator()" class="w-full py-4 bg-gray-200 text-gray-700 rounded-lg font-bold">RESET</button>
        </div>
    </div>

    <script>
        const CONFIG = {
            companyLabel: "YOUR COMPANY NAME HERE", 
            storageKeyPrefix: "hvac_v1_", 
            validTokenHash: "aHZhY19zZWN1cmVfMjAyNg==" 
        };

        const FIELDS = [
    { id: 'price', label: 'Price ($)' }, { id: 'commVal', label: 'Commission Value' },
    { id: 'equipment', label: 'Equip ($)' }, { id: 'materials', label: 'Materials Cost ($)' },
    { id: 'sub', label: 'Sub/Permit ($)' }, // <--- Changed this label here
    { id: 'techHours', label: 'Tech Hrs' },
    { id: 'techRate', label: 'Rate ($)' }, { id: 'driveTime', label: 'Drive Hrs' },
    { id: 'fleetCost', label: 'Fleet ($)' }, { id: 'overhead', label: 'Overhead ($)' }
];
        // Init
        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            if (btoa(params.get('license') || '') === CONFIG.validTokenHash) {
                document.getElementById('lockScreen').classList.add('hidden');
                document.getElementById('appContainer').classList.remove('hidden');
                document.getElementById('companyName').innerText = CONFIG.companyLabel;
                
                const container = document.getElementById('inputFieldsContainer');
                container.innerHTML = FIELDS.map(f => `<div><label class="text-[9px] font-bold uppercase text-gray-400">${f.label}</label><input type="number" id="${f.id}" oninput="calculate()" class="w-full h-10 p-2 border rounded-lg" placeholder="0"></div>`).join('');
                calculate();
            }
        });

        function calculate() {
            const get = (id) => parseFloat(document.getElementById(id).value) || 0;
            const price = get('price'), commType = document.getElementById('commType').value, commVal = get('commVal');
            const commPaid = commType === 'percent' ? price * (commVal / 100) : commVal;
            const direct = get('equipment') + get('materials') + get('sub') + (get('techHours') * get('techRate')) + commPaid;
            const overhead = (get('driveTime') * get('fleetCost')) + get('overhead');
            const net = price - direct - overhead;
            
            document.getElementById('netProfit').innerText = `$${net.toFixed(2)}`;
            document.getElementById('gMargin').innerText = ((price-direct)/price*100 || 0).toFixed(1);
            document.getElementById('nMargin').innerText = (net/price*100 || 0).toFixed(1);
            
            const card = document.getElementById('summary');
            const margin = (net/price*100 || 0);
            card.className = `p-6 rounded-xl text-white shadow-lg mb-6 ${margin < 10 ? 'bg-red-600' : margin < 20 ? 'bg-amber-500' : 'bg-green-600'}`;
        }

        function resetCalculator() {
            FIELDS.forEach(f => document.getElementById(f.id).value = '');
            calculate();
        }
    </script>
</body>
</html>
